<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OceanView — My Reservations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
   <link href="assets/css/guest-reservation.css" rel="stylesheet">
</head>
<body>

<!-- ═══ Top bar ═══ -->
<nav class="topbar">
  <a class="brand" href="#">Ocean<em>View</em></a>
  <a class="btn-logout" href="api/guest/logout">Sign Out</a>
</nav>

<!-- ═══ Page content ═══ -->
<div class="page-wrap">

  <!-- Header -->
  <div class="page-header">
    <p class="page-eyebrow">Guest Portal</p>
    <h1 class="page-title">My <em>Reservations</em></h1>
    <div class="title-rule"></div>
    <p class="page-subtitle">Only reservations linked to your account are displayed below.</p>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none!important"></div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-card-header">
      <span class="table-card-title">Booking history</span>
    </div>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Reservation</th>
            <th>Room</th>
            <th>Check-in</th>
            <th>Check-out</th>
            <th>Status</th>
            <th style="text-align:right">Discount</th>
            <th style="text-align:right">Tax</th>
            <th style="text-align:right">Total</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr class="state-row">
            <td colspan="8">
              <div class="state-icon">
                <div class="loading-dots"><span></span><span></span><span></span></div>
              </div>
              <div class="state-msg">Fetching your reservations…</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const ctx = "/" + window.location.pathname.split("/")[1];

  function esc(s) {
    return (s || "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;")
      .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function badgeClass(status) {
    const s = (status || "").toLowerCase().replace(/\s+/g,"");
    if (s === "confirmed")  return "badge-confirmed";
    if (s === "checkedin" || s === "checked-in") return "badge-checkedin";
    if (s === "checkedout" || s === "checked-out") return "badge-checkedout";
    if (s === "cancelled" || s === "canceled") return "badge-cancelled";
    return "badge-default";
  }

  function formatDate(d) {
    if (!d) return "—";
    const dt = new Date(d);
    if (isNaN(dt)) return esc(d);
    return dt.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  }

  async function loadMine() {
    const tbody = document.getElementById("rows");
    const statsRow = document.getElementById("statsRow");

    try {
      const res = await fetch(ctx + "/api/guest/reservations", { credentials:"include" });
      const data = await res.json();

      tbody.innerHTML = "";

      if (!data.success) {
        tbody.innerHTML = `
          <tr class="state-row"><td colspan="8">
            <div class="state-icon">⚠</div>
            <div class="state-msg" style="color:#fca5a5">${esc(data.message || "Failed to load reservations.")}</div>
          </td></tr>`;
        return;
      }

      const list = data.reservations || [];

      if (list.length === 0) {
        tbody.innerHTML = `
          <tr class="state-row"><td colspan="8">
            <div class="state-icon">◇</div>
            <div class="state-msg">No reservations found for your account.</div>
          </td></tr>`;
        return;
      }

      // Build stats
      const total = list.reduce((s,r)=>s+Number(r.totalAmount||0),0);
      const upcoming = list.filter(r=> ["confirmed","checkedin","checked-in"].includes((r.status||"").toLowerCase())).length;

      statsRow.style.display = "";
      statsRow.style.removeProperty("display");
      // override the !important via style attribute
      statsRow.removeAttribute("style");
      statsRow.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Bookings</div>
          <div class="stat-value">${list.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active / Upcoming</div>
          <div class="stat-value">${upcoming}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value gold">$${Number(total).toLocaleString("en-US",{minimumFractionDigits:2})}</div>
        </div>
      `;

      list.forEach((r, i) => {
        const tr = document.createElement("tr");
        tr.style.animationDelay = (i * 0.06) + "s";
        tr.innerHTML = `
          <td>
            <div class="res-number">${esc(r.reservationNumber)}</div>
          </td>
          <td>
            <div>${esc(r.roomNumber)}</div>
            <div class="room-type">${esc(r.roomType)}</div>
          </td>
          <td><span class="date-cell">${formatDate(r.checkInDate)}</span></td>
          <td><span class="date-cell">${formatDate(r.checkOutDate)}</span></td>
          <td><span class="badge ${badgeClass(r.status)}">${esc(r.status)}</span></td>
          <td style="text-align:right"><span class="discount-cell">${Number(r.discountAmount||0) > 0 ? '-$'+Number(r.discountAmount).toLocaleString("en-US",{minimumFractionDigits:2}) : '<span style="color:var(--text-muted)">—</span>'}</span></td>
          <td style="text-align:right"><span class="tax-cell">$${Number(r.taxAmount||0).toLocaleString("en-US",{minimumFractionDigits:2})}</span></td>
          <td style="text-align:right"><span class="amount">$${Number(r.totalAmount||0).toLocaleString("en-US",{minimumFractionDigits:2})}</span></td>
        `;
        tbody.appendChild(tr);
      });

    } catch(err) {
      tbody.innerHTML = `
        <tr class="state-row"><td colspan="8">
          <div class="state-icon">⚠</div>
          <div class="state-msg" style="color:#fca5a5">Connection error. Please try again.</div>
        </td></tr>`;
    }
  }

  loadMine();
</script>
</body>
</html>
