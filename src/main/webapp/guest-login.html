<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OceanView — Guest Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="assets/css/guest-login.css" rel="stylesheet">
  
</head>
<body>


<div class="panel-image">
  <svg class="waves" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#041526"/>
        <stop offset="40%" stop-color="#0d2a4a"/>
        <stop offset="100%" stop-color="#1a4a7e"/>
      </linearGradient>
      <linearGradient id="deepWater" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a4a7e" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#0b1f3a"/>
      </linearGradient>
      <linearGradient id="midWater" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e5c99" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#163354"/>
      </linearGradient>
      <radialGradient id="moonGlow" cx="72%" cy="22%" r="30%">
        <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
      <radialGradient id="moonCore" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff8e8"/>
        <stop offset="70%" stop-color="#f5e6c0"/>
        <stop offset="100%" stop-color="#e2c97e"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="18" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Sky background -->
    <rect width="1200" height="800" fill="url(#skyGrad)"/>
    <rect width="1200" height="800" fill="url(#moonGlow)"/>

    <!-- Stars -->
    <g opacity="0.7">
      <circle cx="80" cy="50" r="1.2" fill="white" opacity="0.8"/>
      <circle cx="210" cy="30" r="0.8" fill="white" opacity="0.6"/>
      <circle cx="340" cy="70" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="450" cy="25" r="0.9" fill="white" opacity="0.7"/>
      <circle cx="550" cy="55" r="1.1" fill="white" opacity="0.8"/>
      <circle cx="650" cy="40" r="0.7" fill="white" opacity="0.5"/>
      <circle cx="130" cy="110" r="1" fill="white" opacity="0.6"/>
      <circle cx="280" cy="90" r="1.3" fill="white" opacity="0.8"/>
      <circle cx="390" cy="120" r="0.8" fill="white" opacity="0.5"/>
      <circle cx="170" cy="160" r="0.9" fill="white" opacity="0.7"/>
      <circle cx="310" cy="145" r="1.1" fill="white" opacity="0.6"/>
      <circle cx="490" cy="100" r="0.7" fill="white" opacity="0.8"/>
    </g>

    <!-- Moon -->
    <g class="float-orb" style="transform-origin: 855px 175px">
      <circle cx="855" cy="175" r="56" fill="url(#moonGlow)" filter="url(#softGlow)" opacity="0.6"/>
      <circle cx="855" cy="175" r="38" fill="url(#moonCore)" filter="url(#glow)"/>
      <!-- subtle craters -->
      <circle cx="842" cy="163" r="5" fill="#c8a850" opacity="0.3"/>
      <circle cx="866" cy="182" r="3.5" fill="#c8a850" opacity="0.2"/>
    </g>

    <!-- Moon reflection on water -->
    <ellipse cx="855" cy="430" rx="18" ry="80" fill="#e2c97e" opacity="0.12" filter="url(#softGlow)"/>

    <!-- Deep water backdrop -->
    <path d="M0,300 L1200,300 L1200,800 L0,800 Z" fill="url(#deepWater)"/>

    <!-- Wave layer 2 (back) -->
    <path class="wave2" d="M0,260 C200,200 400,300 600,240 C800,180 1000,280 1200,220 L1200,800 L0,800 Z" fill="url(#midWater)"/>

    <!-- Wave layer 1 (front) -->
    <path class="wave1" d="M0,200 C200,130 400,260 600,180 C800,100 1000,220 1200,160 L1200,800 L0,800 Z" fill="#1a4a7e" opacity="0.5"/>

    <!-- Foam highlights -->
    <ellipse cx="200" cy="240" rx="80" ry="4" fill="white" opacity="0.07"/>
    <ellipse cx="700" cy="210" rx="120" ry="3" fill="white" opacity="0.06"/>
    <ellipse cx="1050" cy="255" rx="70" ry="3" fill="white" opacity="0.05"/>

    <!-- Horizon shimmer -->
    <rect x="0" y="295" width="1200" height="2" fill="white" opacity="0.08"/>
  </svg>

  <!-- Text overlay -->
  <div class="overlay-text">
    <p class="tagline">Welcome back</p>
    <div class="divider-line"></div>
    <h1 class="brand-name">Ocean<em>View</em></h1>
    <p class="tagline">Your stay awaits</p>
  </div>
</div>

<!-- ═══ RIGHT: Login Form ═══ -->
<div class="panel-form">
  <div class="form-inner">

    <span class="mobile-brand">Ocean<em>View</em></span>

    <p class="form-eyebrow">Guest Portal</p>
    <h2 class="form-title">Welcome<br>back.</h2>
    <p class="form-subtitle">Use the credentials from your<br>reservation confirmation email.</p>

    <div id="alertWrap" class="alert-error"></div>

    <form id="loginForm" novalidate>

      <div class="field-group">
        <label class="field-label" for="email">Email address</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#c8dff0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22,7-10,7L2,7"/>
          </svg>
          <input id="email" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#c8dff0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7,11V7a5,5,0,0,1,10,0v4"/>
          </svg>
          <input id="password" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>

      <button class="btn-login" type="submit" id="submitBtn">Sign In</button>
    </form>

    <p class="footer-note">Need help? Contact the front desk at your property.</p>
  </div>
</div>

<script>
  const ctx = "/" + window.location.pathname.split("/")[1];

  function showError(msg) {
    const a = document.getElementById("alertWrap");
    a.textContent = msg;
    a.classList.add("visible");
  }

  function hideError() {
    document.getElementById("alertWrap").classList.remove("visible");
  }

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn = document.getElementById("submitBtn");

    if (!email) return showError("Please enter your email address.");
    if (!password) return showError("Please enter your password.");

    btn.classList.add("loading");
    btn.textContent = "Signing in…";

    const body = new URLSearchParams();
    body.set("email", email);
    body.set("password", password);

    try {
      const res = await fetch(ctx + "/api/guest/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
        body: body.toString(),
        credentials: "include"
      });

      let data;
      try { data = await res.json(); }
      catch { showError("Server returned an invalid response."); return; }

      if (!data.success) {
        showError(data.message || "Login failed. Please try again.");
        return;
      }

      window.location.href = ctx + "/guest-reservations.html";
    } catch (err) {
      showError("Connection error. Please try again.");
    } finally {
      btn.classList.remove("loading");
      btn.textContent = "Sign In";
    }
  });
</script>
</body>
</html>
