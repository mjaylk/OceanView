<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ocean View Resort</title>
</head>
<body>
    <h1>Ocean View Reservation System</h1>

    <!-- flash area -->
    <div id="flashBox" style="color:red; margin-bottom:10px;"></div>

    <p><a href="login.html" class="login-btn">Staff Login</a></p>
    <p><a href="help.html" class="help-link">Help</a></p>
    <div class="resort-info">
        Professional reservation management system built with Java Servlets, MySQL, and modern web technologies.
    </div>

    <script>
      const contextPath = '/OceanViewResortBooking';

      async function loadFlashMessages() {
        try {
          const res = await fetch(contextPath + '/api/flash', { credentials: 'include' });
          if (!res.ok) return;
          const data = await res.json();
          const box = document.getElementById('flashBox');
          if (!box) return;

          if (data.error) {
            box.textContent = data.error;
          } else {
            box.textContent = '';
          }
        } catch (e) {
          // ignore
        }
      }

      document.addEventListener('DOMContentLoaded', loadFlashMessages);
    </script>
</body>
</html>
